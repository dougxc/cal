<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Birthday Reveal: 40th Edition</title>
    <link rel="stylesheet" href="style.css">
    <!-- Matter.js for physics -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <!-- Canvas Confetti for celebration -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <div id="game-container">
        <!-- Start Screen -->
        <div id="start-screen" class="overlay">
            <h1>NEBULA 40</h1>
            <p style="margin-bottom: 20px; color: #888;">Tilt your phone to navigate</p>
            <button id="start-btn" class="btn">Start Game</button>
            <div class="toggle-container">
                <span>Sibling Mode</span>
                <label class="switch">
                    <input type="checkbox" id="sibling-mode">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <!-- Win Screen -->
        <div id="win-screen" class="overlay hidden">
            <div id="reveal-card">
                <h1 style="margin: 0; font-size: 2rem;">Happy 40th!</h1>
                <p style="color: var(--neon-pink); margin: 10px 0;">Time to upgrade your nest.</p>
                <div class="placeholder-img">
                    <img id="gift-img" alt="Birthday Gift">
                    <div id="gift-fallback" style="text-align: center;">
                        <span style="font-size: 2rem;">🛏️</span><br>
                        [New Luxury Bed Set]
                    </div>
                </div>
                <button onclick="location.reload()" class="btn" style="padding: 10px 25px; font-size: 0.9rem;">Play Again</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
    <script>
        // PWA Standalone Detection and Install Logic
        let deferredPrompt;
        const installScreen = document.getElementById('install-screen');
        const installBtn = document.getElementById('install-btn');
        const iosInstructions = document.getElementById('ios-instructions');

        const isStandalone = () => window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;

        if (!isStandalone()) {
            installScreen.classList.remove('hidden');
            document.getElementById('start-screen').classList.add('hidden');
            
            // Handle Android/Chrome "beforeinstallprompt"
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                installBtn.style.display = 'block';
            });

            // Handle iOS detection (including iPadOS)
            const isiOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
            if (isiOS) {
                iosInstructions.style.display = 'block';
            }
        }

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    installScreen.classList.add('hidden');
                }
            }
        });

        // Handle image fallbacks
        document.getElementById('gift-img').onerror = function() {
            this.style.display = 'none';
            document.getElementById('gift-fallback').style.display = 'block';
        };
    </script>
</body>
</html>
